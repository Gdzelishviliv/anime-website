# Render Blueprint — deploy all 5 backend services
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: anime-auth-service
    runtime: node
    region: oregon
    rootDir: anime-platform/auth-service
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: REDIS_HOST
        value: ""
      - key: RABBITMQ_URL
        value: ""

  - type: web
    name: anime-user-service
    runtime: node
    region: oregon
    rootDir: anime-platform/user-service
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: REDIS_HOST
        value: ""
      - key: RABBITMQ_URL
        value: ""

  - type: web
    name: anime-anime-service
    runtime: node
    region: oregon
    rootDir: anime-platform/anime-service
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: REDIS_HOST
        value: ""

  - type: web
    name: anime-streaming-service
    runtime: node
    region: oregon
    rootDir: anime-platform/streaming-service
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: REDIS_HOST
        value: ""
      - key: RABBITMQ_URL
        value: ""

  - type: web
    name: anime-subscription-service
    runtime: node
    region: oregon
    rootDir: anime-platform/subscription-service
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: anime-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: REDIS_HOST
        value: ""
      - key: RABBITMQ_URL
        value: ""

databases:
  - name: anime-db
    plan: free
    region: oregon
